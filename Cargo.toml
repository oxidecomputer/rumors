[package]
name = "rumors"
version = "0.1.0"
edition = "2024"

[features]
proptest = ["dep:proptest"]

[dependencies]
proptest = { version = "1", optional = true }
imbl = "7"
generic-array = "1"
bytes = "1"
blake3 = "1.8"
static_assertions = "1.1"
itertools = "0.14"

[dev-dependencies]
proptest = "1"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "tree"
harness = false
