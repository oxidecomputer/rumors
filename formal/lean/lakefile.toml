name = "StreamingMirror"
version = "0.1.0"
defaultTargets = ["StreamingMirror"]

[[require]]
name = "batteries"
git = "https://github.com/leanprover-community/batteries"
rev = "v4.32.0"

[[lean_lib]]
name = "StreamingMirror"

# Analysis control, not part of the library: enumerates the event
# dependency DAG per pinned skeleton, checks acyclicity, dumps
# longest-path depths (the progress lemma's schedule oracle).
# Run: lake exe eventdag [outDir]
[[lean_exe]]
name = "eventdag"
root = "EventDag"

# The mux campaign's executable evidence tier: runs the real Mux
# semantics across the strategy × skeleton × capacity × interleaving
# matrix, asserts the adjudicated shape (positives complete, the wedge
# family jams C-flat under work conservation, the demand-order pusher
# is live at C = 1, commit consultations are singletons), and pins the
# full table against the committed muxprobe-expected.tsv.
# Run: lake exe muxprobe [randSeeds] [--update]
[[lean_exe]]
name = "muxprobe"
root = "Muxprobe"
